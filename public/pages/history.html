<div class="shell">
<header class="topbar">
  <div class="topbar-l"><button class="hamburger" onclick="openNav()"><span></span><span></span><span></span></button><div><div class="topbar-title">Analysis History</div><div class="topbar-sub">All analyses from every device — newest first</div></div></div>
  <div class="topbar-r"><div class="conn-pill online" id="connPill"><span class="cpd"></span><span>Live</span></div><button class="bell-btn" id="bellBtn" onclick="location.href='/pages/alerts.html'"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 1A5 5 0 0 0 3 6v4.5L1.5 13h13L13 10.5V6A5 5 0 0 0 8 1z"/><path d="M6 14a2 2 0 0 0 4 0"/></svg><span class="bell-ct" id="bellCount">0</span></button></div>
</header>
<main class="main">
  <div class="alert-banner" id="alertBanner"><span class="ab-icon">⚠️</span><div class="ab-body"><div class="ab-title">THREAT DETECTED</div><div class="ab-detail" id="bannerDetail">—</div></div><button class="ab-close" onclick="closeBanner()">✕</button></div>
  <div class="stats-row gap14" id="histStats">
    <div class="stat"><div class="stat-stripe blue"></div><div class="stat-ic si-blue"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#4361EE" stroke-width="1.7"><rect x="2" y="2" width="16" height="16" rx="2"/></svg></div><div><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div></div>
    <div class="stat"><div class="stat-stripe red"></div><div class="stat-ic si-red"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#DC2626" stroke-width="1.7"><path d="M10 2L2 17h16L10 2z"/></svg></div><div><div class="stat-n" id="sThreat">0</div><div class="stat-l">Threats</div></div></div>
    <div class="stat"><div class="stat-stripe green"></div><div class="stat-ic si-green"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#059669" stroke-width="1.7"><polyline points="4,10 8,14 16,6"/></svg></div><div><div class="stat-n" id="sAvg">—</div><div class="stat-l">Avg Score</div></div></div>
    <div class="stat"><div class="stat-stripe amber"></div><div class="stat-ic si-amber"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#D97706" stroke-width="1.7"><circle cx="10" cy="10" r="7.5"/></svg></div><div><div class="stat-n" id="sRate">0%</div><div class="stat-l">Threat Rate</div></div></div>
  </div>
  <div class="card">
    <div class="card-hd" style="padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between">
      <span class="card-title">COMPLETE ANALYSIS LOG</span>
      <button onclick="fetchHistory()" style="font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid var(--line2);background:none;color:var(--t3);cursor:pointer;font-weight:600">↻ Refresh</button>
    </div>
    <div class="htable" id="histTable"><div class="empty" style="padding:32px">Loading...</div></div>
  </div>
</main>
</div>
